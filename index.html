<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Movie Search Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen transition" id="body">

<div class="max-w-6xl mx-auto p-6">
  <h1 class="text-4xl font-bold mb-4 text-center">🌍 Movie Search Pro</h1>

  <div class="flex flex-wrap gap-2 mb-6">
    <input id="searchInput" type="text" placeholder="Search movies..." class="flex-1 p-3 rounded-xl text-black">
    <button onclick="searchMovies()" class="bg-blue-500 px-6 rounded-xl">Search</button>
    <button onclick="toggleTheme()" class="bg-purple-500 px-4 rounded-xl">Toggle Theme</button>
  </div>

  <div id="movies" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
</div>

<script>
const API_KEY = "7c25a5";

function toggleTheme() {
  const body = document.getElementById('body');
  body.classList.toggle('bg-gray-900');
  body.classList.toggle('bg-white');
  body.classList.toggle('text-white');
  body.classList.toggle('text-black');
}

async function searchMovies() {
  const query = document.getElementById('searchInput').value;
  const moviesDiv = document.getElementById('movies');
  moviesDiv.innerHTML = "Loading...";

  const res = await fetch(`https://www.omdbapi.com/?s=${query}&apikey=${API_KEY}`);
  const data = await res.json();

  if (data.Response === "False") {
    moviesDiv.innerHTML = "No results found.";
    return;
  }

  moviesDiv.innerHTML = data.Search.map(movie => `
    <div class="bg-gray-800 p-4 rounded-2xl shadow-lg">
      <img src="${movie.Poster !== 'N/A' ? movie.Poster : 'https://via.placeholder.com/300x450'}" 
           class="w-full h-80 object-cover rounded-xl mb-3" />
      <h2 class="text-xl font-semibold">${movie.Title}</h2>
      <p class="text-gray-400">${movie.Year}</p>
      <button onclick="loadMovie('${movie.imdbID}')" 
        class="mt-3 bg-green-500 px-3 py-1 rounded">View Details</button>
    </div>
  `).join('');
}

async function loadMovie(id) {
  const moviesDiv = document.getElementById('movies');
  moviesDiv.innerHTML = "Loading movie...";

  const res = await fetch(`https://www.omdbapi.com/?i=${id}&apikey=${API_KEY}`);
  const movie = await res.json();

  moviesDiv.innerHTML = `
    <div class="bg-gray-800 p-6 rounded-2xl shadow-lg col-span-2">
      <img src="${movie.Poster !== 'N/A' ? movie.Poster : 'https://via.placeholder.com/300x450'}" 
           class="w-64 mx-auto rounded-xl mb-4" />
      <h2 class="text-3xl font-bold text-center">${movie.Title}</h2>
      <p class="text-center text-gray-400">${movie.Year} • ${movie.Genre}</p>
      <p class="text-center text-yellow-400 mt-2">⭐ ${movie.imdbRating}</p>
      <p class="mt-4">${movie.Plot}</p>
      
      <div class="mt-4 text-center">
        <a href="https://www.youtube.com/results?search_query=${movie.Title}+full+movie" 
           target="_blank" class="text-blue-400 underline">▶ Try Watching</a>
      </div>

      <button onclick="searchMovies()" class="mt-6 bg-blue-500 px-4 py-2 rounded block mx-auto">⬅ Back</button>
    </div>
  `;
}
</script>

</body>
</html>
