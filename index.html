<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Movie Search Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen transition" id="body">

<div class="max-w-6xl mx-auto p-6">
  <h1 class="text-4xl font-bold mb-4 text-center">🌍 Movie Search Pro</h1>

  <!-- Controls -->
  <div class="flex flex-wrap gap-2 mb-6">
    <input id="searchInput" type="text" placeholder="Search movies..." class="flex-1 p-3 rounded-xl text-black">
    <select id="typeFilter" class="p-3 rounded-xl text-black">
      <option value="">All</option>
      <option value="movie">Movies</option>
      <option value="series">Series</option>
    </select>
    <button onclick="searchMovies()" class="bg-blue-500 px-6 rounded-xl">Search</button>
    <button onclick="toggleTheme()" class="bg-purple-500 px-4 rounded-xl">Toggle Theme</button>
  </div>

  <!-- Results -->
  <div id="movies" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
</div>

<script>
const API_KEY = "YOUR_OMDB_API_KEY";
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

function toggleTheme() {
  const body = document.getElementById('body');
  body.classList.toggle('bg-gray-900');
  body.classList.toggle('bg-white');
  body.classList.toggle('text-white');
  body.classList.toggle('text-black');
}

function saveFavorites() {
  localStorage.setItem('favorites', JSON.stringify(favorites));
}

function toggleFavorite(movie) {
  const exists = favorites.find(m => m.imdbID === movie.imdbID);
  if (exists) {
    favorites = favorites.filter(m => m.imdbID !== movie.imdbID);
  } else {
    favorites.push(movie);
  }
  saveFavorites();
  searchMovies();
}

async function searchMovies() {
  const query = document.getElementById('searchInput').value;
  const type = document.getElementById('typeFilter').value;
  const moviesDiv = document.getElementById('movies');
  moviesDiv.innerHTML = "Loading...";

  const res = await fetch(`https://www.omdbapi.com/?s=${query}&type=${type}&apikey=${API_KEY}`);
  const data = await res.json();

  if (data.Response === "False") {
    moviesDiv.innerHTML = "No results found.";
    return;
  }

  moviesDiv.innerHTML = await Promise.all(data.Search.map(async movie => {
    const detailRes = await fetch(`https://www.omdbapi.com/?i=${movie.imdbID}&apikey=${API_KEY}`);
    const detail = await detailRes.json();

    const isFav = favorites.find(m => m.imdbID === movie.imdbID);

    return `
      <div class="bg-gray-800 p-4 rounded-2xl shadow-lg">
        <img src="${movie.Poster}" class="w-full h-64 object-cover rounded-xl mb-3" />
        <h2 class="text-xl font-semibold">${movie.Title}</h2>
        <p class="text-gray-400">${movie.Year}</p>
        <p class="text-yellow-400">⭐ ${detail.imdbRating}</p>
        <p class="text-sm mt-2">${detail.Plot}</p>
        <a href="https://www.youtube.com/results?search_query=${movie.Title}+trailer" target="_blank" class="text-blue-400 block mt-2">▶ Watch Trailer</a>
        <button onclick='toggleFavorite(${JSON.stringify(movie)})' class="mt-3 bg-red-500 px-3 py-1 rounded">
          ${isFav ? 'Remove Favorite' : 'Add to Favorites'}
        </button>
      </div>
    `;
  })).then(arr => arr.join(''));
}
</script>

</body>
</html>
